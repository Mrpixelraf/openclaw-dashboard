<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦞 OpenClaw Control Tower</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #141414;
    --surface2: #1c1c1c;
    --surface3: #252525;
    --border:   #2a2a2a;
    --text:     #e0e0e0;
    --muted:    #666;
    --accent:   #7c3aed;
    --accent2:  #a855f7;
    --green:    #22c55e;
    --red:      #ef4444;
    --yellow:   #f59e0b;
    --blue:     #3b82f6;
    --cyan:     #06b6d4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 13px; line-height: 1.6;
    min-height: 100vh;
  }

  /* ── Header ───────────────────────────────────────────────── */
  #header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface); border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  #header .title { font-size: 15px; font-weight: 600; letter-spacing: 0.5px; }
  #header .title span { color: var(--accent2); }
  #header .meta { display: flex; gap: 16px; align-items: center; color: var(--muted); font-size: 12px; }
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500;
  }
  .badge.green  { background: #14532d33; color: var(--green); border: 1px solid #14532d88; }
  .badge.red    { background: #45151533; color: var(--red);   border: 1px solid #45151588; }
  .badge.yellow { background: #45350033; color: var(--yellow);border: 1px solid #45350088; }
  .badge.blue   { background: #1e3a5f33; color: var(--blue);  border: 1px solid #1e3a5f88; }
  .badge.purple { background: #3b0f6033; color: var(--accent2); border: 1px solid #3b0f6088; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
  .dot.pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Stat row ─────────────────────────────────────────────── */
  #stat-row {
    display: grid; grid-template-columns: repeat(6, 1fr);
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-box {
    background: var(--surface); padding: 12px 16px;
    display: flex; flex-direction: column; gap: 3px;
  }
  .stat-box .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .stat-box .value { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat-box .sub   { font-size: 11px; color: var(--muted); }
  .stat-box .value.green  { color: var(--green); }
  .stat-box .value.yellow { color: var(--yellow); }
  .stat-box .value.blue   { color: var(--blue); }
  .stat-box .value.purple { color: var(--accent2); }
  .stat-box .value.cyan   { color: var(--cyan); }

  /* ── Main grid ────────────────────────────────────────────── */
  #main { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  /* ── Cards ────────────────────────────────────────────────── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .card-header {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 11px; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-body { padding: 14px; }

  /* ── Agents grid ──────────────────────────────────────────── */
  #agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; }
  .agent-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    transition: border-color 0.2s;
  }
  .agent-card.active { border-color: var(--accent); }
  .agent-header {
    padding: 12px 14px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .agent-name { font-size: 16px; font-weight: 600; }
  .agent-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; }
  .agent-row {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px;
  }
  .agent-row .key { color: var(--muted); }
  .agent-row .val { font-weight: 500; }
  .agent-tabs {
    display: flex; gap: 0;
    border-top: 1px solid var(--border);
  }
  .agent-tab {
    flex: 1; padding: 7px 10px;
    font-size: 11px; color: var(--muted);
    background: none; border: none; cursor: pointer;
    text-align: center; letter-spacing: 0.5px;
    border-right: 1px solid var(--border);
    transition: background 0.15s, color 0.15s;
    font-family: inherit;
  }
  .agent-tab:last-child { border-right: none; }
  .agent-tab:hover { background: var(--surface3); color: var(--text); }
  .agent-tab.active { background: var(--surface3); color: var(--accent2); }
  .agent-panel {
    display: none; padding: 12px 14px;
    border-top: 1px solid var(--border);
    max-height: 280px; overflow-y: auto;
  }
  .agent-panel.visible { display: block; }
  .agent-panel .md-content {
    font-size: 12px; line-height: 1.7; color: #ccc;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .agent-panel .md-content h1,h2,h3 { color: var(--text); margin: 10px 0 4px; font-size: 13px; }
  .agent-panel .md-content h1 { font-size: 15px; }
  .agent-panel .md-content p { margin-bottom: 6px; }
  .agent-panel .md-content ul,ol { padding-left: 18px; margin-bottom: 6px; }
  .agent-panel .md-content code { background: var(--surface3); padding: 1px 4px; border-radius: 3px; font-size: 11px; }
  .agent-panel .md-content hr { border: none; border-top: 1px solid var(--border); margin: 8px 0; }
  .agent-panel .md-content strong { color: var(--text); }

  /* ── Sub-agents ───────────────────────────────────────────── */
  .subagent-item {
    padding: 10px 12px; background: var(--surface2); border-radius: 6px;
    margin-bottom: 8px; font-size: 12px;
  }
  .subagent-item:last-child { margin-bottom: 0; }
  .subagent-item .sa-label { font-weight: 600; margin-bottom: 4px; }
  .subagent-item .sa-task  { color: var(--muted); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .subagent-item .sa-meta  { display: flex; gap: 8px; flex-wrap: wrap; }
  .subagent-item .sa-meta span { color: var(--muted); font-size: 11px; }
  .sa-status-ok      { color: var(--green); }
  .sa-status-error   { color: var(--red); }
  .sa-status-unknown { color: var(--muted); }
  .empty-note { color: var(--muted); font-size: 12px; text-align: center; padding: 16px; }

  /* ── Cron table ───────────────────────────────────────────── */
  .cron-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .cron-table th {
    text-align: left; padding: 7px 10px;
    color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border); font-weight: 500;
  }
  .cron-table td { padding: 8px 10px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; }
  .cron-table tr:last-child td { border-bottom: none; }
  .cron-table tr:hover td { background: var(--surface2); }
  .cron-name { font-weight: 500; }
  .cron-sched { color: var(--muted); font-size: 11px; }
  .cron-next  { color: var(--blue); }
  .cron-error-count { color: var(--red); font-weight: 600; }
  .cron-last-err {
    font-size: 10px; color: var(--red); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px;
  }
  .disabled-row td { opacity: 0.4; }

  /* ── Cost panel ───────────────────────────────────────────── */
  #costs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .cost-model-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; background: var(--surface2); border-radius: 4px;
    margin-bottom: 4px; font-size: 12px;
  }
  .cost-model-row .model-name { color: var(--muted); }
  .cost-model-row .model-cost { font-weight: 600; color: var(--cyan); }
  .cost-model-row .model-tok  { color: var(--muted); font-size: 11px; }
  .day-bar-row { margin-bottom: 5px; }
  .day-bar-row .day-label { font-size: 11px; color: var(--muted); margin-bottom: 2px; display: flex; justify-content: space-between; }
  .day-bar-bg { background: var(--surface3); border-radius: 2px; height: 8px; overflow: hidden; }
  .day-bar-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.4s; }

  /* ── Log panel ────────────────────────────────────────────── */
  #log-container {
    background: #080808; border: 1px solid var(--border); border-radius: 8px;
    font-size: 11.5px; overflow: hidden;
  }
  #log-header {
    padding: 8px 14px; background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  }
  #log-filter {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 3px 8px; border-radius: 4px; font-size: 11px;
    font-family: inherit; outline: none; width: 180px;
  }
  #log-filter:focus { border-color: var(--accent); }
  #log-lines {
    height: 280px; overflow-y: auto; padding: 10px 14px;
    scroll-behavior: smooth;
  }
  #log-lines::-webkit-scrollbar { width: 4px; }
  #log-lines::-webkit-scrollbar-track { background: transparent; }
  #log-lines::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-line { margin-bottom: 1px; white-space: pre-wrap; word-break: break-all; color: #999; }
  .log-line.ts       { color: #555; }
  .log-line.discord  { color: #7aa2f7; }
  .log-line.ws       { color: #9ece6a; }
  .log-line.warn     { color: var(--yellow); }
  .log-line.error    { color: var(--red); }
  .log-line.browser  { color: #bb9af7; }
  .log-line.gateway  { color: #7dcfff; }

  /* ── Scrollbars ───────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Refresh indicator ────────────────────────────────────── */
  #refresh-bar {
    height: 2px; background: var(--accent); width: 0%;
    transition: width 15s linear;
    position: fixed; top: 0; left: 0; z-index: 200;
  }
  #refresh-bar.go { width: 100%; }

  /* ── Layout helpers ───────────────────────────────────────── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 900px) {
    #stat-row { grid-template-columns: repeat(3, 1fr); }
    .two-col { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="refresh-bar"></div>

<!-- Header -->
<div id="header">
  <div class="title">🦞 OpenClaw <span>Control Tower</span></div>
  <div class="meta">
    <span id="version-badge"></span>
    <span id="gateway-badge"></span>
    <span id="last-updated">Loading…</span>
  </div>
</div>

<!-- Stat row -->
<div id="stat-row">
  <div class="stat-box">
    <div class="label">Agents</div>
    <div class="value purple" id="stat-agents">—</div>
    <div class="sub" id="stat-agents-sub"></div>
  </div>
  <div class="stat-box">
    <div class="label">Sub-agents</div>
    <div class="value cyan" id="stat-subagents">—</div>
    <div class="sub" id="stat-subagents-sub"></div>
  </div>
  <div class="stat-box">
    <div class="label">Cron Jobs</div>
    <div class="value blue" id="stat-crons">—</div>
    <div class="sub" id="stat-crons-sub"></div>
  </div>
  <div class="stat-box">
    <div class="label">Cost Today</div>
    <div class="value green" id="stat-today-cost">—</div>
    <div class="sub" id="stat-today-tokens"></div>
  </div>
  <div class="stat-box">
    <div class="label">Cost (30d)</div>
    <div class="value yellow" id="stat-total-cost">—</div>
    <div class="sub" id="stat-total-tokens"></div>
  </div>
  <div class="stat-box">
    <div class="label">Next Cron</div>
    <div class="value blue" id="stat-next-cron">—</div>
    <div class="sub" id="stat-next-cron-name"></div>
  </div>
</div>

<!-- Main content -->
<div id="main">

  <!-- Agents -->
  <div>
    <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-left:2px;">
      Agents
    </div>
    <div id="agents-grid"></div>
  </div>

  <!-- Cron jobs -->
  <div class="card">
    <div class="card-header">
      <span>Scheduled Jobs</span>
      <span id="cron-error-summary" style="color:var(--red);font-size:11px;"></span>
    </div>
    <div class="card-body" style="padding:0;">
      <table class="cron-table">
        <thead>
          <tr>
            <th>Job</th>
            <th>Schedule</th>
            <th>Last Run</th>
            <th>Status</th>
            <th>Next Run</th>
            <th>Errors</th>
          </tr>
        </thead>
        <tbody id="cron-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Sub-agents + Costs -->
  <div class="two-col">

    <!-- Sub-agents -->
    <div class="card">
      <div class="card-header">
        <span>Sub-agents</span>
        <span id="subagents-active-badge"></span>
      </div>
      <div class="card-body" id="subagents-body"></div>
    </div>

    <!-- Token costs -->
    <div class="card">
      <div class="card-header">Token &amp; Cost Breakdown</div>
      <div class="card-body">
        <div id="costs-grid">
          <div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">By Model (30d)</div>
            <div id="cost-by-model"></div>
          </div>
          <div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;">Daily Spend (30d)</div>
            <div id="cost-by-day"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Live log -->
  <div id="log-container">
    <div id="log-header">
      <span>Live Gateway Log <span id="log-live-dot" class="dot pulse" style="color:var(--green);display:inline-block;"></span></span>
      <input id="log-filter" type="text" placeholder="filter…" oninput="filterLog(this.value)">
    </div>
    <div id="log-lines"></div>
  </div>

</div>

<script>
// ── Utilities ────────────────────────────────────────────────────────────────
function fmt$  (n) { return n < 0.01 ? '<$0.01' : '$' + n.toFixed(n < 1 ? 3 : 2); }
function fmtTok(n) { return n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(0)+'k' : String(n); }
function fmtMs (ms) {
  if (!ms) return '—';
  const s = Math.floor(ms / 1000), m = Math.floor(s / 60), h = Math.floor(m / 60), d = Math.floor(h / 24);
  if (d > 0)  return d + 'd ago';
  if (h > 0)  return h + 'h ago';
  if (m > 0)  return m + 'm ago';
  if (s > 10) return s + 's ago';
  return 'just now';
}
function fmtAbs(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  return d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}
function fmtCountdown(ms) {
  if (!ms) return '—';
  const diff = ms - Date.now();
  if (diff < 0) return 'overdue';
  const m = Math.floor(diff / 60000), h = Math.floor(m / 60);
  if (h > 0) return 'in ' + h + 'h ' + (m % 60) + 'm';
  return 'in ' + m + 'm';
}
function fmtDur(ms) {
  if (!ms) return '';
  if (ms < 1000) return ms + 'ms';
  return (ms / 1000).toFixed(1) + 's';
}
function cronHuman(sched) {
  if (!sched) return '';
  if (sched.kind === 'every') {
    const h = Math.floor(sched.everyMs / 3600000);
    const m = Math.floor((sched.everyMs % 3600000) / 60000);
    if (h && m) return `every ${h}h ${m}m`;
    if (h)      return `every ${h}h`;
    return       `every ${m}m`;
  }
  const expr = sched.expr || '';
  // Common patterns
  const map = {
    '0 5 30 * * *': '05:30 daily', '30 5 * * *': '05:30 daily',
    '0 7 * * *': '07:00 daily',   '0 8 * * 1-5': '08:00 weekdays',
    '0 21 * * *': '21:00 daily',  '30 22 * * *': '22:30 daily',
    '0 4 * * *': '04:00 daily',   '0 20 * * 0': 'Sun 20:00',
    '0 12 1 * *': '1st/month 12:00',
  };
  return map[expr] || expr;
}

// ── Log rendering ────────────────────────────────────────────────────────────
let logLines = [];
let logFilter = '';
function logClass(line) {
  if (line.includes('[discord]'))         return 'discord';
  if (line.includes('[ws]'))              return 'ws';
  if (line.includes('[warn]'))            return 'warn';
  if (line.includes('[error]') || line.includes('Error')) return 'error';
  if (line.includes('[browser'))          return 'browser';
  if (line.includes('[gateway]'))         return 'gateway';
  return '';
}
function renderLog() {
  const el = document.getElementById('log-lines');
  const filtered = logFilter
    ? logLines.filter(l => l.toLowerCase().includes(logFilter.toLowerCase()))
    : logLines;
  el.innerHTML = filtered.map(l =>
    `<div class="log-line ${logClass(l)}">${escHtml(l)}</div>`
  ).join('');
  el.scrollTop = el.scrollHeight;
}
function filterLog(v) { logFilter = v; renderLog(); }
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Initial log load ─────────────────────────────────────────────────────────
fetch('/api/log').then(r => r.json()).then(lines => {
  logLines = lines.slice(-200);
  renderLog();
});

// ── SSE live log ─────────────────────────────────────────────────────────────
const sse = new EventSource('/api/events');
sse.onmessage = e => {
  const line = JSON.parse(e.data);
  logLines.push(line);
  if (logLines.length > 500) logLines.shift();
  renderLog();
};
sse.onerror = () => {
  document.getElementById('log-live-dot').style.color = 'var(--red)';
};

// ── Main data ────────────────────────────────────────────────────────────────
async function refresh() {
  const bar = document.getElementById('refresh-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  setTimeout(() => { bar.style.transition = 'width 15s linear'; bar.style.width = '100%'; }, 50);

  let data;
  try {
    const r = await fetch('/api/data');
    data = await r.json();
  } catch (e) {
    document.getElementById('last-updated').textContent = '⚠ fetch failed';
    return;
  }

  renderHeader(data);
  renderStatRow(data);
  renderAgents(data.agents || []);
  renderCrons(data.crons || []);
  renderSubagents(data.subagents || {});
  renderCosts(data.costs || {});

  document.getElementById('last-updated').textContent =
    'Updated ' + new Date(data.ts).toLocaleTimeString('zh-CN');
}

// ── Header ───────────────────────────────────────────────────────────────────
function renderHeader({ gateway }) {
  if (!gateway) return;
  const vb = document.getElementById('version-badge');
  vb.innerHTML = gateway.version
    ? `<span class="badge purple">v${gateway.version}</span>` : '';

  const gb = document.getElementById('gateway-badge');
  const cls = { online: 'green', stale: 'yellow', offline: 'red' }[gateway.status] || 'red';
  const lbl = { online: 'Online', stale: 'Stale', offline: 'Offline' }[gateway.status] || '?';
  gb.innerHTML = `<span class="badge ${cls}"><span class="dot${cls==='green'?' pulse':''}"></span>${lbl}</span>`;
}

// ── Stat row ─────────────────────────────────────────────────────────────────
function renderStatRow({ agents, subagents, crons, costs }) {
  const activeAgents = (agents || []).filter(a => a.status === 'active').length;
  document.getElementById('stat-agents').textContent = (agents || []).length;
  document.getElementById('stat-agents-sub').textContent = activeAgents ? `${activeAgents} active` : 'all idle';

  const activeSA = (subagents?.active || []).length;
  const recentSA = (subagents?.recent || []).length;
  document.getElementById('stat-subagents').textContent = activeSA;
  document.getElementById('stat-subagents-sub').textContent = `${recentSA} in 48h`;

  const totalCrons = (crons || []).length;
  const errCrons   = (crons || []).filter(c => c.consecutiveErrors > 0).length;
  document.getElementById('stat-crons').textContent = totalCrons;
  document.getElementById('stat-crons-sub').textContent = errCrons ? `⚠ ${errCrons} with errors` : 'all OK';

  if (costs?.today) {
    document.getElementById('stat-today-cost').textContent = fmt$(costs.today.cost);
    document.getElementById('stat-today-tokens').textContent = fmtTok(costs.today.tokens) + ' tokens';
  }
  if (costs?.total) {
    document.getElementById('stat-total-cost').textContent = fmt$(costs.total.cost);
    document.getElementById('stat-total-tokens').textContent = fmtTok(costs.total.tokens) + ' tokens';
  }

  // Next cron
  const upcoming = (crons || [])
    .filter(c => c.enabled && c.nextRunAtMs)
    .sort((a, b) => a.nextRunAtMs - b.nextRunAtMs)[0];
  if (upcoming) {
    document.getElementById('stat-next-cron').textContent = fmtCountdown(upcoming.nextRunAtMs);
    document.getElementById('stat-next-cron-name').textContent = upcoming.name;
  }
}

// ── Agents ───────────────────────────────────────────────────────────────────
function renderAgents(agents) {
  const grid = document.getElementById('agents-grid');
  grid.innerHTML = agents.map(a => agentCard(a)).join('');
}

function agentCard(a) {
  const isActive = a.status === 'active';
  const statusBadge = isActive
    ? `<span class="badge green"><span class="dot pulse"></span>Active</span>`
    : `<span class="badge" style="background:#1a1a1a;color:var(--muted);border:1px solid var(--border);">Idle</span>`;

  const modelShort = (a.model || '').replace('claude-', '').replace(/-20\d{6}$/, '');

  const tabs = ['Memory', 'Soul', 'Identity', "Today's Log"];
  const panels = [
    a.memory   ? marked.parse(a.memory)   : '<em style="color:var(--muted)">No memory file</em>',
    a.soul     ? marked.parse(a.soul)     : '<em style="color:var(--muted)">No soul file</em>',
    a.identity ? marked.parse(a.identity) : '<em style="color:var(--muted)">No identity file</em>',
    a.dailyLog ? marked.parse(a.dailyLog) : '<em style="color:var(--muted)">No log for today</em>',
  ];

  const tabsHtml = tabs.map((t, i) =>
    `<button class="agent-tab${i===0?' active':''}" onclick="switchTab('${a.id}',${i},this)">${t}</button>`
  ).join('');

  const panelsHtml = panels.map((p, i) =>
    `<div class="agent-panel${i===0?' visible':''}" id="panel-${a.id}-${i}">
      <div class="md-content">${p}</div>
    </div>`
  ).join('');

  return `
    <div class="agent-card${isActive?' active':''}">
      <div class="agent-header">
        <div class="agent-name">${a.emoji} ${a.name}</div>
        ${statusBadge}
      </div>
      <div class="agent-body">
        <div class="agent-row">
          <span class="key">Model</span>
          <span class="val" style="color:var(--cyan)">${modelShort || '—'}</span>
        </div>
        <div class="agent-row">
          <span class="key">Last activity</span>
          <span class="val">${fmtMs(Date.now() - a.lastActivity)}</span>
        </div>
        <div class="agent-row">
          <span class="key">Sessions</span>
          <span class="val">${a.sessionCount} total${a.recentSessions ? `, ${a.recentSessions} active (1h)` : ''}</span>
        </div>
        <div class="agent-row">
          <span class="key">Auth errors</span>
          <span class="val" style="color:${a.authErrorCount>0?'var(--red)':'var(--green)'}">${a.authErrorCount}</span>
        </div>
      </div>
      <div class="agent-tabs">${tabsHtml}</div>
      ${panelsHtml}
    </div>`;
}

function switchTab(agentId, idx, btn) {
  // deactivate all tabs in this card
  btn.closest('.agent-card').querySelectorAll('.agent-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  // hide all panels
  btn.closest('.agent-card').querySelectorAll('.agent-panel').forEach(p => p.classList.remove('visible'));
  document.getElementById(`panel-${agentId}-${idx}`).classList.add('visible');
}

// ── Cron jobs ────────────────────────────────────────────────────────────────
function renderCrons(crons) {
  const tbody = document.getElementById('cron-tbody');
  const errorCount = crons.filter(c => c.consecutiveErrors > 0).length;
  document.getElementById('cron-error-summary').textContent =
    errorCount ? `⚠ ${errorCount} job${errorCount>1?'s':''} with errors` : '';

  tbody.innerHTML = crons.map(c => {
    const statusHtml = !c.lastStatus ? '<span style="color:var(--muted)">—</span>'
      : c.lastStatus === 'ok'
        ? `<span class="badge green" style="font-size:10px;">OK</span>`
        : `<span class="badge red" style="font-size:10px;">ERR</span>`;

    const errHtml = c.consecutiveErrors > 0
      ? `<div class="cron-last-err" title="${escHtml(c.lastError||'')}">${escHtml((c.lastError||'').slice(0,80))}</div>`
      : '';

    return `<tr class="${c.enabled?'':'disabled-row'}">
      <td>
        <div class="cron-name">${escHtml(c.name)}</div>
        ${errHtml}
      </td>
      <td class="cron-sched">${cronHuman(c.schedule)}</td>
      <td style="color:var(--muted)">${c.lastRunAtMs ? fmtMs(Date.now()-c.lastRunAtMs) : '—'}${c.lastDurationMs?' <span style="font-size:10px">('+fmtDur(c.lastDurationMs)+')</span>':''}</td>
      <td>${statusHtml}</td>
      <td class="cron-next">${c.enabled ? fmtCountdown(c.nextRunAtMs) : '<span style="color:var(--muted)">disabled</span>'}</td>
      <td class="${c.consecutiveErrors>0?'cron-error-count':''}">${c.consecutiveErrors||''}</td>
    </tr>`;
  }).join('');
}

// ── Sub-agents ───────────────────────────────────────────────────────────────
function renderSubagents({ active = [], recent = [] }) {
  const badge = document.getElementById('subagents-active-badge');
  badge.innerHTML = active.length
    ? `<span class="badge green"><span class="dot pulse"></span>${active.length} running</span>`
    : '';

  const body = document.getElementById('subagents-body');
  if (!active.length && !recent.length) {
    body.innerHTML = '<div class="empty-note">No sub-agents in the last 48h</div>';
    return;
  }

  let html = '';
  if (active.length) {
    html += active.map(r => `
      <div class="subagent-item" style="border-left:2px solid var(--green);">
        <div class="sa-label">🟢 ${escHtml(r.label)}</div>
        <div class="sa-task">${escHtml(r.task)}</div>
        <div class="sa-meta">
          <span>model: ${r.model||'?'}</span>
          <span>started ${fmtMs(Date.now()-r.startedAt)}</span>
        </div>
      </div>`).join('');
  }
  if (recent.length) {
    html += recent.map(r => {
      const cls = r.status === 'ok' ? 'sa-status-ok' : r.status === 'error' ? 'sa-status-error' : 'sa-status-unknown';
      return `
      <div class="subagent-item">
        <div class="sa-label"><span class="${cls}">${r.status === 'ok' ? '✓' : r.status === 'error' ? '✗' : '?'}</span> ${escHtml(r.label)}</div>
        <div class="sa-task">${escHtml(r.task)}</div>
        <div class="sa-meta">
          <span>model: ${r.model||'?'}</span>
          <span>${fmtMs(Date.now()-r.endedAt)}</span>
          <span>${fmtDur(r.durationMs)}</span>
        </div>
      </div>`;
    }).join('');
  }
  body.innerHTML = html;
}

// ── Costs ────────────────────────────────────────────────────────────────────
function renderCosts({ byModel = {}, byDay = {} }) {
  // By model
  const modelEl = document.getElementById('cost-by-model');
  const models = Object.entries(byModel).sort((a, b) => b[1].cost - a[1].cost);
  if (!models.length) { modelEl.innerHTML = '<div class="empty-note">No data</div>'; }
  else {
    modelEl.innerHTML = models.map(([m, v]) => `
      <div class="cost-model-row">
        <span class="model-name">${m.replace('claude-','').replace(/-20\d{6}$/,'')}</span>
        <div style="text-align:right">
          <div class="model-cost">${fmt$(v.cost)}</div>
          <div class="model-tok">${fmtTok(v.tokens)}tok</div>
        </div>
      </div>`).join('');
  }

  // By day (last 14 days)
  const dayEl = document.getElementById('cost-by-day');
  const today = new Date().toISOString().slice(0,10);
  const days = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(d.toISOString().slice(0,10));
  }
  const maxCost = Math.max(...days.map(d => byDay[d]?.cost || 0), 0.001);
  dayEl.innerHTML = days.filter(d => byDay[d]?.cost).map(d => {
    const v = byDay[d] || { cost: 0 };
    const pct = Math.round((v.cost / maxCost) * 100);
    const label = d === today ? 'Today' : d.slice(5);
    return `<div class="day-bar-row">
      <div class="day-label"><span>${label}</span><span style="color:var(--cyan)">${fmt$(v.cost)}</span></div>
      <div class="day-bar-bg"><div class="day-bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('') || '<div class="empty-note">No data</div>';
}

// ── Auto refresh ─────────────────────────────────────────────────────────────
refresh();
setInterval(refresh, 15000);

// ── Tick countdown ────────────────────────────────────────────────────────────
setInterval(() => {
  document.querySelectorAll('[data-next-ms]').forEach(el => {
    el.textContent = fmtCountdown(+el.dataset.nextMs);
  });
}, 30000);
</script>
